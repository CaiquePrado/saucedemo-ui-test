name: e2e-tests

on:
  push:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * 1,3,5"

jobs:
  cypress-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v6

      - name: Correr testes do Cypress
        uses: cypress-io/github-action@v7
        with:
          browser: chrome
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CYPRESS_username: ${{ secrets.SAUCE_USERNAME }}
          CYPRESS_password: ${{ secrets.SAUCE_PASSWORD }}

      - name: Guardar Relatório Mochawesome
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: relatorio-cypress
          path: cypress/reports/html
